<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>ALakes</title>
</head>
<body>
  <title>Alejandro Lagos</title>

  <div class="cuadro">
    <h3>Ingreso al sistema</h3>
    <form>
      <!-- Se dividieron en div de dos para ordenarlos, cada campo se agrupa en un div para organizar label e input verticalmente-->
      <div class="campo">
        <label>Usuario</label>
        <input type="text" placeholder="Ingresa tu usuario">
      </div>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" placeholder="Ingresa contraseña" required> <!-- type password para que no se vea la contraseña cuando se escribe y required para que sea un requerimiento obligatorio-->
      </div>


      <button type="submit" class="btn btn-dark w-100">Ingresar</button> <!-- btn activa estilo de boton bootstrap, btn-primary (color azul moderno) w-100 usa todo el ancho del cuadro-->
    </form>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
